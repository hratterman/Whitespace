<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Whitespace deck</title>
<style>
  :root{
    --paper:#f0eee8; --surface:#fcfcfb; --ink:#171614; --ink-2:#52514e;
    --muted:#898781; --hair:#e1e0d9; --accent:#1c5cab; --accent-soft:#e3edf9;
    --good:#0ca30c; --warn:#b95c33; --bad:#c23636;
    --s1:#2a78d6; --s2:#1baf7a; --s3:#eda100; --s4:#008300;
    --ch-own:#2a78d6; --ch-net:#e34948; --ch-store:#eda100; --ch-other:#8a8781;
    --serif:Georgia,'Times New Roman',serif;
    --sans:ui-sans-serif,-apple-system,'Segoe UI',Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box;margin:0}
  html,body{height:100%}
  body{background:var(--paper);font-family:var(--sans);color:var(--ink);overflow:hidden}
  #stage{position:fixed;inset:0;display:flex;align-items:center;justify-content:center}
  .slide{width:1280px;height:720px;background:var(--surface);border:1px solid var(--hair);
         box-shadow:0 18px 50px rgba(23,22,20,.10);position:absolute;
         padding:64px 84px 56px;display:none;flex-direction:column;border-radius:6px}
  .slide.active{display:flex}
  .eyebrow{font-size:13px;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);
           font-weight:600;margin-bottom:14px}
  h1{font-family:var(--serif);font-weight:400;font-size:52px;line-height:1.12;text-wrap:balance}
  h2{font-family:var(--serif);font-weight:400;font-size:34px;line-height:1.2;margin-bottom:10px;text-wrap:balance}
  .narr{font-size:17px;line-height:1.55;color:var(--ink-2);max-width:70ch}
  .narr.sm{font-size:15px;max-width:84ch}
  .foot{position:absolute;left:84px;right:84px;bottom:22px;display:flex;justify-content:space-between;
        font-size:12px;color:var(--muted)}
  .badge{display:inline-block;font-size:11.5px;letter-spacing:.06em;text-transform:uppercase;
         color:var(--warn);border:1px solid currentColor;border-radius:99px;padding:3px 10px}
  .chip{display:inline-block;font-size:12px;color:var(--accent);background:var(--accent-soft);
        border-radius:99px;padding:3px 10px;font-weight:600}
  /* title slide */
  .why{margin-top:34px;border-left:3px solid var(--accent);padding:14px 22px;background:var(--accent-soft);
       border-radius:0 8px 8px 0;font-size:18px;line-height:1.55;max-width:74ch}
  .sub{margin-top:16px;color:var(--muted);font-size:16px}
  /* verdict + tiles */
  .verdict{font-family:var(--serif);font-size:27px;margin:6px 0 20px;color:var(--ink)}
  .tiles{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin:18px 0 20px}
  .tile{border:1px solid var(--hair);border-radius:10px;padding:16px 18px;background:#fff}
  .tile .q{font-size:12.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);font-weight:600}
  .tile .sub2{font-size:12px;color:var(--muted);margin-top:2px}
  .tile .v{font-size:34px;font-family:var(--serif);margin:10px 0 2px;font-variant-numeric:tabular-nums}
  .tile .bench{font-size:13px;color:var(--ink-2)}
  .pill{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:600;
        border-radius:99px;padding:3px 10px;margin-top:12px}
  .pill.good{color:var(--good);background:#eaf6ea}.pill.warn{color:var(--warn);background:#f9efe8}
  .pill.bad{color:var(--bad);background:#f9eaea}
  /* charts */
  .chartwrap{flex:1;min-height:0;display:flex;flex-direction:column;justify-content:center;overflow:hidden}
  .legend{display:flex;gap:20px;margin:8px 0 12px;font-size:13px;color:var(--ink-2)}
  .legend .sw{display:inline-block;width:11px;height:11px;border-radius:3px;margin-right:7px;vertical-align:-1px}
  .brow{display:grid;grid-template-columns:230px 1fr;align-items:center;margin-bottom:9px}
  .blabel{font-size:13.5px;color:var(--ink);padding-right:18px;line-height:1.25}
  .bars{display:flex;flex-direction:column;gap:2px;position:relative}
  .bar{height:12px;border-radius:0 4px 4px 0;position:relative;min-width:2px}
  .bar .val{position:absolute;left:calc(100% + 8px);top:50%;transform:translateY(-50%);
            font-size:12.5px;color:var(--ink-2);font-variant-numeric:tabular-nums;white-space:nowrap}
  .headroom{position:absolute;top:-3px;bottom:-3px;border:2px dashed var(--accent);border-radius:6px;left:-3px}
  .caption{font-size:12px;color:var(--muted);margin-top:12px}
  /* stacked channel */
  .stackrow{display:grid;grid-template-columns:230px 1fr;align-items:center;margin-bottom:20px}
  .stack{display:flex;height:34px;border-radius:6px;overflow:hidden;gap:2px;background:var(--surface)}
  .seg{display:flex;align-items:center;justify-content:center;font-size:12.5px;color:#fff;
       font-weight:600;font-variant-numeric:tabular-nums;min-width:0;overflow:hidden}
  .seg.lowc{color:var(--ink)}
  /* bullets */
  ul.crit{margin:20px 0 0 2px;list-style:none;display:flex;flex-direction:column;gap:14px;max-width:75ch}
  ul.crit li{font-size:17px;line-height:1.5;color:var(--ink-2);padding-left:26px;position:relative}
  ul.crit li::before{content:"";position:absolute;left:2px;top:9px;width:9px;height:9px;
                     border-radius:2px;background:var(--accent)}
  /* table */
  table{border-collapse:collapse;width:100%;margin-top:18px;font-size:15px}
  th,td{text-align:left;padding:11px 14px;border-bottom:1px solid var(--hair)}
  th{font-size:12.5px;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);font-weight:600}
  td:first-child{font-weight:600}
  .yes{color:var(--good);font-weight:700}.no{color:var(--muted)}
  tr.hl td{background:var(--accent-soft)}
  /* packs */
  .packs{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;margin-top:18px}
  .pack{border:1px solid var(--hair);border-radius:12px;padding:20px;background:#fff;display:flex;flex-direction:column}
  .pack h3{font-family:var(--serif);font-weight:400;font-size:21px}
  .pack .tgt{font-size:13px;color:var(--ink-2);margin:4px 0 12px}
  .pack ul{list-style:none;font-size:13.5px;color:var(--ink-2);display:flex;flex-direction:column;gap:5px;flex:1}
  .pack ul li{display:flex;justify-content:space-between;gap:10px}
  .pack .newtag{color:var(--warn);font-size:11px;font-weight:700;text-transform:uppercase}
  .pack .price{margin-top:14px;padding-top:12px;border-top:1px solid var(--hair);display:flex;
               justify-content:space-between;align-items:baseline}
  .pack .sum{font-size:13px;color:var(--muted);text-decoration:line-through}
  .pack .bundle{font-family:var(--serif);font-size:26px;color:var(--accent)}
  /* recommendation */
  .recs{display:grid;grid-template-columns:1fr 1fr;gap:26px;margin-top:20px}
  .reccol h3{font-size:13px;letter-spacing:.12em;text-transform:uppercase;font-weight:700;margin-bottom:14px}
  .reccol.now h3{color:var(--accent)}.reccol.next h3{color:var(--muted)}
  .rec{display:grid;grid-template-columns:30px 1fr;gap:10px;margin-bottom:15px}
  .rec .n{font-family:var(--serif);font-size:19px;color:var(--muted)}
  .rec b{font-size:16px}.rec p{font-size:14px;color:var(--ink-2);line-height:1.45;margin-top:3px}
  /* appendix */
  .app{display:grid;grid-template-columns:1fr 1fr;gap:8px 34px;margin-top:14px;font-size:13px;
       color:var(--ink-2);overflow:auto;flex:1;min-height:0}
  .app h4{font-size:11.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin:10px 0 6px}
  .app li{margin:0 0 5px 16px;line-height:1.4}
  /* nav */
  #dots{position:fixed;bottom:14px;left:50%;transform:translateX(-50%);display:flex;gap:7px;z-index:5}
  #dots button{width:8px;height:8px;border-radius:99px;border:none;background:#c9c6bd;cursor:pointer;padding:0}
  #dots button.on{background:var(--accent);width:22px}
  #hint{position:fixed;top:14px;right:18px;font-size:12px;color:var(--muted);z-index:5}
  .closer{font-family:var(--serif);font-size:40px;line-height:1.25;max-width:20ch;text-wrap:balance;margin-top:8px}
  @media (prefers-reduced-motion:no-preference){.slide.active{animation:in .28s ease}
    @keyframes in{from{opacity:0;transform:translateY(8px)}to{opacity:1}}}
  @media print{
    body{overflow:visible;background:#fff}
    #stage{position:static;display:block}
    .slide{display:flex !important;position:relative;transform:none !important;margin:0 auto;
           page-break-after:always;box-shadow:none;border:none;border-radius:0}
    #dots,#hint{display:none}
    *{-webkit-print-color-adjust:exact;print-color-adjust:exact}
  }
</style>
</head>
<body>
<div id="stage"></div>
<div id="dots"></div>
<div id="hint">← → to navigate · ⌘P for PDF</div>
<script id="payload" type="application/json">/*__PAYLOAD__*/</script>
<script>
const {analysis:A, report:R} = JSON.parse(document.getElementById('payload').textContent);
const S = ['#2a78d6','#1baf7a','#eda100','#008300'];
const P = A.premise||{}, PD = P.deck||{}, PC = P.captions||{};
const CH_COLORS = ['#2a78d6','#e34948','#eda100','#8a8781'];
const CH = Object.entries(P.channels||{own_channel:'Own channel',internet:'Internet',
            aftermarket_store:'Aftermarket',other:'Other'})
  .slice(0,4).reduce((m,[k,label],i)=>(m[k]=[label,CH_COLORS[i]],m),{});
const esc = s => String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const el = h => {const d=document.createElement('div');d.innerHTML=h;return d.firstElementChild;};
const slides = [];
const foot = n => `<div class="foot"><span>${esc(A.meta.brand)} · ${esc(A.meta.mode)} · ${esc(A.meta.generated)}</span>
  <span>${R.badge?`<span class="badge">${esc(R.badge)}</span> &nbsp; `:''}<span class="pg"></span></span></div>`;

function slide(eyebrow, inner){
  slides.push(el(`<section class="slide"><div class="eyebrow">${esc(eyebrow)}</div>${inner}${foot()}</section>`));
}

/* ---------- 1 · title ---------- */
slide(P.eyebrow||'Category whitespace & merchandising analysis', `
  <div style="flex:1;display:flex;flex-direction:column;justify-content:center">
    <h1>${esc(R.title)}</h1>
    <div class="sub">${esc(R.subtitle||'')}</div>
    <div class="why">${esc(R.why_it_matters)}</div>
  </div>`);

/* ---------- 2 · diagnosis ---------- */
{
  const p = (R.diagnosis.pattern||[]);
  const tiles = p.map(t=>`<div class="tile">
      <div class="q">${esc(t.question)}</div><div class="sub2">${esc(t.sub||'')}</div>
      <div class="v">${esc(t.brand_display)}</div>
      <div class="bench">vs ${esc(t.benchmark_display)}</div>
      <div class="pill ${esc(t.tone||'warn')}">${{good:'✓',warn:'△',bad:'✕'}[t.tone]||'△'} ${esc(t.read)}</div>
    </div>`).join('');
  slide('The diagnosis', p.length ? `
    <h2 class="verdict">${esc(R.diagnosis.verdict)}</h2>
    <div class="tiles">${tiles}</div>
    <p class="narr">${esc(R.diagnosis.narrative)}</p>` : `
    <div style="flex:1;display:flex;flex-direction:column;justify-content:center;gap:18px">
      <h2 class="verdict" style="font-size:32px">${esc(R.diagnosis.verdict)}</h2>
      <p class="narr" style="font-size:19px;max-width:66ch">${esc(R.diagnosis.narrative)}</p>
    </div>`);
}

/* ---------- 3 · composition ---------- */
{
  const c = R.composition, isMix = c.source==='purchase_mix';
  const brandName = A.meta.brand;
  const val = (entity, bucket) => {
    if (isMix){ const row=A.diagnostic.purchase_mix.buckets[bucket]||{};
      return row[entity===brandName?'brand':entity] ?? null; }
    const comp = entity===brandName ? A.catalog_composition.brand
                                    : A.catalog_composition.competitors[entity];
    return comp?.buckets?.[bucket]?.share ?? 0;
  };
  const bucketKeys = Object.keys(A.buckets).filter(b =>
      c.entities.some(e => (val(e,b)||0) > 0));
  bucketKeys.sort((a,b)=>(val(brandName,b)||0)-(val(brandName,a)||0));
  const maxV = Math.max(...bucketKeys.flatMap(b=>c.entities.map(e=>val(e,b)||0)));
  const rows = bucketKeys.map(b=>{
    const benchMax = Math.max(...c.entities.slice(1).map(e=>val(e,b)||0));
    const hl = b===c.callout_bucket;
    return `<div class="brow"><div class="blabel">${esc(A.buckets[b])}</div><div class="bars">
      ${hl?`<div class="headroom" style="width:calc(${(benchMax/maxV*90).toFixed(1)}% + 6px)"></div>`:''}
      ${c.entities.map((e,i)=>{const v=val(e,b);
        return v==null?'':`<div class="bar" style="width:${(v/maxV*90).toFixed(1)}%;background:${S[i]}">
          <span class="val">${(v*100).toFixed(0)}%</span></div>`}).join('')}
    </div></div>`}).join('');
  slide('The composition gap', `
    <h2>${esc(c.headline)}</h2>
    <p class="narr sm">${esc(c.narrative||'')}</p>
    <div class="chartwrap">
      <div class="legend">${c.entities.map((e,i)=>`<span><span class="sw" style="background:${S[i]}"></span>${esc(e)}</span>`).join('')}</div>
      ${rows}
      <div class="caption">${isMix?(PC.mix||'Purchase mix — share of purchases; sums to 100% per brand.')
        :(PC.offer_share||'Catalog share — share of SKUs offered (offer-side, not behavioral).')} Dashed outline marks benchmark headroom.</div>
    </div>`);
}

/* ---------- 4 · behavior vs presence ---------- */
if (R.benchmark_note) slide('Benchmark behavior, not presence', `
  <h2>${esc(R.benchmark_note.headline)}</h2>
  <div style="flex:1;display:flex;align-items:center"><p class="narr" style="font-size:19px;max-width:66ch">${esc(R.benchmark_note.narrative)}</p></div>`);

/* ---------- 5 · channel ---------- */
if (R.channel && A.diagnostic?.channel){
  const ch = A.diagnostic.channel, brandName = A.meta.brand;
  const rowFor = (label, channels) => `<div class="stackrow"><div class="blabel">${esc(label)}</div>
    <div class="stack">${Object.entries(CH).map(([k,[nm,col]])=>{
      const v = channels[k]||0; if(!v) return '';
      return `<div class="seg${col==='#eda100'?' lowc':''}" style="flex:${v};background:${col}">${v>=0.12?(v*100).toFixed(0)+'%':''}</div>`;
    }).join('')}</div></div>`;
  const benches = (ch.benchmark_gaps||[]).filter(g=>R.channel.entities.includes(g.benchmark));
  slide(PD.capture_eyebrow||'Channel leakage & recapture', `
    <h2>${esc(R.channel.headline)}</h2>
    <p class="narr sm">${esc(R.channel.narrative||'')}</p>
    <div class="chartwrap">
      <div class="legend">${Object.values(CH).map(([nm,col])=>`<span><span class="sw" style="background:${col}"></span>${nm}</span>`).join('')}</div>
      ${rowFor(brandName, ch.brand_channels)}
      ${benches.map(g=>rowFor(g.benchmark, g.benchmark_channels||{own_channel:g.benchmark_own_channel,other:1-g.benchmark_own_channel})).join('')}
      <div class="caption">${PC.capture||'Channel share — share of purchases by channel; sums to 100% per brand.'}</div>
    </div>`);
}

/* ---------- 6 · storefront ---------- */
if (R.storefront_critique) slide('What the buyer sees today', `
  <h2>${esc(R.storefront_critique.headline)}</h2>
  <ul class="crit">${(R.storefront_critique.bullets||[]).map(b=>`<li>${esc(b)}</li>`).join('')}</ul>`);

/* ---------- 7 · merchandising benchmark ---------- */
if (R.merchandising_benchmark && A.merchandising){
  const m = A.merchandising, all=[{...m.brand,_brand:true},...(m.competitors||[])];
  const tick = v => v?'<span class="yes">✓</span>':'<span class="no">—</span>';
  slide(PD.presentation_eyebrow||'How the leaders merchandise', `
    <h2>${esc(R.merchandising_benchmark.headline)}</h2>
    <p class="narr">${esc(R.merchandising_benchmark.narrative||'')}</p>
    <table><tr><th></th><th>${esc((P.audit_labels||{}).bundles||'Bundles')}</th><th>${esc((P.audit_labels||{}).named_packs||'Named packs')}</th><th>${esc((P.audit_labels||{}).curation||'Curation')}</th><th>${esc((P.audit_labels||{}).bespoke||'Bespoke')}</th></tr>
    ${all.map(x=>`<tr${x._brand?' class="hl"':''}><td>${esc(x.name)}</td><td>${tick(x.bundles)}</td>
      <td>${(x.named_packs||[]).length? esc((x.named_packs||[]).join(', ')):'<span class="no">—</span>'}</td>
      <td>${esc(x.curation_level||'none')}</td><td>${tick(x.bespoke)}</td></tr>`).join('')}
    </table>`);
}

/* ---------- 8 · packs ---------- */
if (R.packs?.items?.length) slide(PD.packs_eyebrow||'Packs from the existing catalog', `
  <h2>${esc(R.packs.headline)}</h2>
  <p class="narr">${esc(R.packs.narrative||'')}</p>
  <div class="packs">${R.packs.items.map(p=>`<div class="pack">
    <h3>${esc(p.name)}</h3><div class="tgt">${esc(p.target)}${p.grounding?` · <span class="chip">${esc(p.grounding)}</span>`:''}</div>
    <ul>${(p.skus||[]).map(s=>`<li><span>${esc(s.name)}${s.exists===false?' <span class="newtag">new</span>':''}</span><span>${esc(s.price)}</span></li>`).join('')}</ul>
    <div class="price"><span class="sum">${esc(p.component_sum)}</span><span class="bundle">${esc(p.bundle_price)}</span></div>
  </div>`).join('')}</div>`);

/* ---------- 9 · pricing ---------- */
if (R.pricing_note) slide('Pricing & product quality', `
  <h2>${esc(R.pricing_note.headline)}</h2>
  <div style="flex:1;display:flex;align-items:center"><p class="narr" style="font-size:19px;max-width:66ch">${esc(R.pricing_note.narrative)}</p></div>`);

/* ---------- 10 · recommendation ---------- */
{
  const col = (items, cls, title) => `<div class="reccol ${cls}"><h3>${title}</h3>
    ${(items||[]).map((r,i)=>`<div class="rec"><div class="n">${i+1}</div>
      <div><b>${esc(r.action)}</b><p>${esc(r.detail||'')}</p></div></div>`).join('')}</div>`;
  slide('The recommendation, sequenced', `
    <h2>${esc(PD.recommendation_headline||'Merchandise first. Build later.')}</h2>
    <div class="recs">${col(R.recommendation.now,'now',esc(PD.now_label||'Now — today’s catalog'))}
                       ${col(R.recommendation.next,'next',esc(PD.next_label||'Next — new capability'))}</div>`);
}

/* ---------- 11 · next step ---------- */
slide('The next step', `
  <div style="flex:1;display:flex;flex-direction:column;justify-content:center">
    <h2 style="font-size:22px;color:var(--accent)">${esc(R.next_step.headline||'One low-cost proof')}</h2>
    <div class="closer">${esc(R.next_step.narrative)}</div>
  </div>`);

/* ---------- 12 · appendix ---------- */
{
  const ap = R.appendix||{};
  const list = xs => xs?.length? `<ul>${xs.map(x=>`<li>${esc(x)}</li>`).join('')}</ul>` : '<ul><li>none</li></ul>';
  slide('Appendix — mapping & data notes', `
    <h2 style="font-size:26px">Every judgment call, on the record</h2>
    <div class="app">
      <div><h4>Bucket resolutions (model)</h4>
        ${list((ap.mapping_resolutions||[]).map(m=>`${m.sku} → ${m.bucket} — ${m.reason}`))}
        <h4>Comparability calls</h4>${list(ap.comparability_calls)}</div>
      <div><h4>Data flags</h4>${list(ap.data_flags)}
        <h4>Figure types</h4><p style="line-height:1.5">${esc(ap.figure_types_note||'')}</p></div>
    </div>`);
}

/* ---------- mount + nav ---------- */
const stage=document.getElementById('stage'), dots=document.getElementById('dots');
slides.forEach((s,i)=>{stage.appendChild(s);
  const b=document.createElement('button');b.onclick=()=>go(i);dots.appendChild(b);});
let cur=0;
function go(i){cur=Math.max(0,Math.min(slides.length-1,i));
  slides.forEach((s,j)=>{s.classList.toggle('active',j===cur);
    s.querySelector('.pg').textContent=`${j+1} / ${slides.length}`;});
  [...dots.children].forEach((d,j)=>d.classList.toggle('on',j===cur));}
function fit(){const sc=Math.min(innerWidth/1340,innerHeight/800,1);
  slides.forEach(s=>s.style.transform=`scale(${sc})`);}
addEventListener('resize',fit);
addEventListener('keydown',e=>{
  if(['ArrowRight',' ','PageDown'].includes(e.key)){e.preventDefault();go(cur+1);}
  if(['ArrowLeft','PageUp'].includes(e.key)){e.preventDefault();go(cur-1);}
  if(e.key==='Home')go(0); if(e.key==='End')go(slides.length-1);});
stage.addEventListener('click',e=>{if(e.target.closest('a,button'))return;
  go(e.clientX>innerWidth/2?cur+1:cur-1);});
fit();go(0);
document.title=R.title;
</script>
</body>
</html>
