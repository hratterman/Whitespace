# Premise: portfolio vs competitors (the generic frame).
# For any world with a portfolio of offerings, competitors with portfolios of
# their own, and (optionally) data on what customers actually choose:
# content libraries, practice areas, program schedules, feature sets.
# Prefer deriving a sharper custom premise when the world has its own
# vocabulary - this preset is the honest generic fallback.

key: portfolio
name: Portfolio whitespace
description: >
  A portfolio of offerings competing against rival portfolios, with optional
  data on what customers actually choose.
entity_noun: offering
catalog_noun: portfolio
pack_noun: package
eyebrow: Portfolio whitespace analysis

questions:
  participation:
    label: Participation
    question: do customers engage with any offering at all?
    canonical_field: attach_rate
  depth:
    label: Depth
    question: how much per participating customer?
    canonical_field: median_spend
  mix:
    label: Mix
    question: which offering types do they actually choose?
  capture:
    label: Capture
    question: through your channel, or through intermediaries?

channels:
  own_channel: Own channel
  internet: Intermediaries
  aftermarket_store: Third parties
  other: Other

captions:
  mix: "Choice mix: share of customer choices by bucket; sums to 100% per player."
  offer_share: "Portfolio share: share of offerings listed (offer-side, not behavioral)."
  capture: "Capture share: share of engagement by channel; sums to 100% per player."

audit_labels:
  bundles: Bundled offers
  named_packs: Named packages
  curation: Guidance
  bespoke: Tailored options

deck:
  capture_eyebrow: Capture & intermediary leakage
  presentation_eyebrow: How the leaders package & guide
  packs_eyebrow: Packages from the existing portfolio
  recommendation_headline: Package first. Build later.
  now_label: Now - today's portfolio
  next_label: Next - new capability

guidance: >
  Behavioral data means whatever measures real customer choice in this world
  - purchases, bookings, enrollments, usage. Keep the discipline intact:
  choice mix is share of choices (sums to 100%); participation is the only
  share-of-customers figure; offer-side shares are never behavioral claims.
  The behavior-shifting benchmark is the competitor whose CUSTOMERS
  demonstrably choose the under-developed buckets, not the one with the
  biggest menu. Before running, confirm the frame fits: distinct offerings,
  real competitors, and a mix dimension. If any is missing, this is the
  wrong tool - say so.
