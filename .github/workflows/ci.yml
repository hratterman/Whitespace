name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -r requirements.txt
      - name: House style: no em or en dashes anywhere
        run: |
          if grep -rInP '\xe2\x80\x94|\xe2\x80\x93' --exclude-dir=.git --exclude-dir=out --exclude-dir=__pycache__ --exclude='*.png' .; then
            echo "em/en dash found; house style forbids them" && exit 1
          fi
      - name: Unit tests
        run: python -m unittest discover -s tests -v
      - name: Smoke - full-diagnostic fixture (automotive)
        run: python -m whitespace prompt examples/meridian
      - name: Smoke - public-data fixture with taxonomy override (coffee)
        run: python -m whitespace analyze examples/solstice
      - name: Smoke - deck + one-pager render on both fixtures
        run: |
          cp examples/meridian/sample-report.json examples/meridian/out/report.json
          python -m whitespace render examples/meridian
          cp examples/solstice/sample-report.json examples/solstice/out/report.json
          python -m whitespace render examples/solstice
          python -m whitespace analyze examples/harborline
          cp examples/harborline/sample-report.json examples/harborline/out/report.json
          python -m whitespace render examples/harborline
      - name: Smoke - scaffold guards against empty inputs
        run: |
          python -m whitespace init /tmp/ci-scaffold --brand "CI Brand"
          if python -m whitespace analyze /tmp/ci-scaffold; then
            echo "empty scaffold should have failed" && exit 1
          fi
