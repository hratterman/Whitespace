<svg width="880" height="200" viewBox="0 0 880 200" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Whitespace — category whitespace and merchandising analysis">
  <!-- bucket-bars motif: composition with one under-developed bucket (the whitespace) -->
  <g transform="translate(56,36)">
    <rect x="0"   y="38" width="26" height="90" rx="4" fill="#8d8a84"/>
    <rect x="38"  y="62" width="26" height="66" rx="4" fill="#6e6b66"/>
    <!-- the gap: short bar + dashed headroom -->
    <rect x="76"  y="104" width="26" height="24" rx="4" fill="#5598e7"/>
    <rect x="76"  y="30" width="26" height="68" rx="4" fill="none" stroke="#5598e7" stroke-width="2" stroke-dasharray="5 5"/>
    <rect x="114" y="78" width="26" height="50" rx="4" fill="#6e6b66"/>
    <rect x="152" y="96" width="26" height="32" rx="4" fill="#524f4b"/>
    <line x1="-8" y1="128" x2="186" y2="128" stroke="#f2f1ec" stroke-width="2"/>
  </g>
  <g transform="translate(300,0)">
    <text x="0" y="96" font-family="Georgia, 'Times New Roman', serif" font-size="58" fill="#f2f1ec">Whitespace</text>
    <text x="2" y="134" font-family="ui-sans-serif, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="17" letter-spacing="0.4" fill="#c3c2b7">Category whitespace &amp; merchandising analysis &#8212;</text>
    <text x="2" y="160" font-family="ui-sans-serif, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="17" letter-spacing="0.4" fill="#c3c2b7">diagnosed, argued, committable.</text>
  </g>
</svg>
