<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Whitespace one-pager</title>
<style>
  :root{
    --surface:#fcfcfb; --ink:#171614; --ink-2:#52514e; --muted:#898781;
    --hair:#e1e0d9; --accent:#1c5cab; --accent-soft:#e3edf9;
    --good:#0ca30c; --warn:#b95c33; --bad:#c23636;
    --s1:#2a78d6; --s2:#1baf7a;
    --serif:Georgia,'Times New Roman',serif;
    --sans:ui-sans-serif,-apple-system,'Segoe UI',Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box;margin:0}
  body{background:#eceae4;font-family:var(--sans);color:var(--ink);padding:34px 16px}
  .page{max-width:820px;margin:0 auto;background:var(--surface);border:1px solid var(--hair);
        border-radius:6px;padding:46px 54px;box-shadow:0 10px 34px rgba(23,22,20,.08)}
  .eyebrow{font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);font-weight:600}
  h1{font-family:var(--serif);font-weight:400;font-size:30px;line-height:1.18;margin:8px 0 4px;text-wrap:balance}
  .sub{color:var(--muted);font-size:13.5px}
  .badge{display:inline-block;font-size:10.5px;letter-spacing:.06em;text-transform:uppercase;
         color:var(--warn);border:1px solid currentColor;border-radius:99px;padding:2px 9px;margin-left:8px;vertical-align:2px}
  .verdict{margin:20px 0 6px;padding:13px 18px;background:var(--accent-soft);border-left:3px solid var(--accent);
           border-radius:0 8px 8px 0;font-family:var(--serif);font-size:17.5px}
  .why{font-size:14px;line-height:1.55;color:var(--ink-2);margin:12px 0 4px}
  h2{font-size:11.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);
     font-weight:700;margin:26px 0 10px;padding-top:16px;border-top:1px solid var(--hair)}
  .tiles{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
  .tile{border:1px solid var(--hair);border-radius:9px;padding:11px 13px}
  .tile .q{font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);font-weight:700}
  .tile .v{font-family:var(--serif);font-size:23px;margin:6px 0 1px;font-variant-numeric:tabular-nums}
  .tile .bench{font-size:11.5px;color:var(--ink-2)}
  .tile .read{font-size:11px;font-weight:600;margin-top:7px}
  .read.good{color:var(--good)}.read.warn{color:var(--warn)}.read.bad{color:var(--bad)}
  .legend{display:flex;gap:16px;font-size:12px;color:var(--ink-2);margin-bottom:10px}
  .legend .sw{display:inline-block;width:9px;height:9px;border-radius:2px;margin-right:5px}
  .brow{display:grid;grid-template-columns:190px 1fr;align-items:center;margin-bottom:9px}
  .blabel{font-size:12.5px;padding-right:14px}
  .bars{display:flex;flex-direction:column;gap:2px}
  .bar{height:11px;border-radius:0 3px 3px 0;position:relative;min-width:2px}
  .bar .val{position:absolute;left:calc(100% + 6px);top:50%;transform:translateY(-50%);
            font-size:10.5px;color:var(--ink-2);font-variant-numeric:tabular-nums}
  .caption{font-size:11px;color:var(--muted);margin-top:8px}
  .rec{display:grid;grid-template-columns:24px 1fr;gap:8px;margin-bottom:10px}
  .rec .n{font-family:var(--serif);font-size:15px;color:var(--muted)}
  .rec b{font-size:13.5px}.rec p{font-size:12.5px;color:var(--ink-2);line-height:1.45;margin-top:1px}
  .next{background:#f6f5f1;border-radius:9px;padding:14px 18px;font-size:13.5px;line-height:1.5}
  .foot{margin-top:22px;padding-top:12px;border-top:1px solid var(--hair);font-size:11px;color:var(--muted);
        display:flex;justify-content:space-between}
  @media print{body{background:#fff;padding:0}.page{border:none;box-shadow:none;max-width:none;border-radius:0}
    *{-webkit-print-color-adjust:exact;print-color-adjust:exact}}
</style>
</head>

d SKUs are excluded from catalog_share figures; the model must resolve each (recording bucket + reason) before treating composition as final"}, "data_flags": []}, "report": {"title": "The Accessory Buyer Is Already Here - We're Just Not Selling to Them", "subtitle": "Meridian Trucks · category whitespace & merchandising analysis · full-diagnostic mode", "badge": "Synthetic demonstration data", "why_it_matters": "Meridian's buyers attach accessories at the same rate as the best benchmark but spend $210 less per buyer doing it ($310 vs $520 median) - and 44% of what they buy, they buy on the internet instead of from us. Closing part of that gap is worth on the order of $130+ per vehicle sold, with most of the fix requiring no new products.", "diagnosis": {"verdict": "This is a merchandising problem, not a demand problem.", "narrative": "Normal attach + low spend + basic mix + high leakage is the signature of an under-merchandised catalog, not weak demand. Nearly two-thirds of Meridian buyers already walk in wanting accessories - they buy cheap protective basics from us and everything more interesting from someone else, somewhere else. Any recommendation built on demand generation would be spending money to create a customer we already have.", "pattern": [{"question": "Attach", "sub": "do buyers buy anything?", "brand_display": "64%", "benchmark_display": "66% (Northstar)", "read": "Normal - demand exists", "tone": "good"}, {"question": "Spend", "sub": "median per buyer", "brand_display": "$310", "benchmark_display": "$520 (Northstar)", "read": "40% below benchmark", "tone": "bad"}, {"question": "Mix", "sub": "share of purchases", "brand_display": "48%", "benchmark_display": "29% commodity (Northstar)", "read": "Basic, commodity-heavy", "tone": "warn"}, {"question": "Channel", "sub": "own-channel capture", "brand_display": "34%", "benchmark_display": "52% (Northstar)", "read": "Leaking - 44% to internet", "tone": "bad"}]}, "composition": {"headline": "We under-sell the categories that grow spend", "narrative": "Meridian buyers put nearly half their accessory dollars into mats, liners, and guards - the high-attach, low-ceiling bucket. Northstar's buyers put 31% into visible personalization, the bucket that carries their $520 median spend. That 17-point personalization gap is the spend gap.", "source": "purchase_mix", "entities": ["Meridian Trucks", "Northstar Motors", "Copperline Auto"], "callout_bucket": "exterior_personalization"}, "benchmark_note": {"headline": "Copperline is the cautionary tale: presence isn't behavior", "narrative": "Copperline's Speedworks performance sub-brand occupies 25% of its catalog, yet performance is just 7% of what its buyers purchase - and its median spend is $350, barely above Meridian. Shelf presence alone does not move buyers. Northstar's difference is that it merchandises the shift: four named packs sold in the configurator, shop-by-build journeys, accessorized trucks on every model page. Among brands whose customers actually buy personalization, Meridian's do not - and the winning mechanism is merchandising, not ranging more SKUs."}, "channel": {"headline": "18 points of recapture headroom", "narrative": "Meridian captures 34% of its buyers' accessory purchases in its own channel; 44% goes to the internet. Northstar captures 52% at equal attach. These are purchases that already happen, by our buyers, in categories we already stock - the fix is digital merchandising and point-of-order bundles, not product.", "entities": ["Meridian Trucks", "Northstar Motors", "Copperline Auto"]}, "storefront_critique": {"headline": "A parts counter, not a store", "bullets": ["Accessories listed alphabetically within part-type categories; the only navigation aid is a fitment filter.", "No accessorized trucks anywhere - a buyer cannot see what a Talon looks like with boards, a tonneau, and a bed tent on it.", "No bundles, no named packs, no guidance - 33 SKUs presented flat, the $1,249 exhaust listed with the same weight as a $45 door-edge guard.", "The configurator sells zero accessories at the moment of highest intent: point of vehicle order."]}, "merchandising_benchmark": {"headline": "The leaders sell the journey, not the part number", "narrative": "Vantage shows the default outcome of doing nothing. Copperline shows a half-measure - storytelling for one niche its buyers don't convert on. Northstar runs the full playbook, and its buyers' mix and spend follow."}, "packs": {"headline": "Three packs, shippable this quarter", "narrative": "Meridian's buyer base over-indexes on camping/outdoors (124), fishing/hunting (118), and DIY (111). Every SKU below already exists. Pets index at par (97) - a later niche test at most; golf indexes at 72, so golf theming would be a gimmick and we recommend against it.", "items": [{"name": "Basecamp Pack", "target": "Talon · the camping weekender", "grounding": "affinity 124", "skus": [{"name": "Basecamp Bed Tent", "price": "$329"}, {"name": "Heavy-Duty Bed Mat", "price": "$139"}, {"name": "Bed Tie-Down Cleats", "price": "$69"}, {"name": "All-Weather Floor Liners (both rows)", "price": "$228"}], "component_sum": "$765", "bundle_price": "$699"}, {"name": "Backroads Pack", "target": "Talon · the fishing & hunting buyer", "grounding": "affinity 118", "skus": [{"name": "Soft Roll-Up Tonneau Cover", "price": "$479"}, {"name": "Splash Guards", "price": "$89"}, {"name": "Mud Flaps", "price": "$75"}, {"name": "Under-Seat Storage Bin", "price": "$179"}], "component_sum": "$822", "bundle_price": "$749"}, {"name": "Weekend Workhorse Pack", "target": "Talon · the DIY project hauler", "grounding": "affinity 111", "skus": [{"name": "Trailer Hitch Receiver (Class IV)", "price": "$429"}, {"name": "Trailer Wiring Harness", "price": "$79"}, {"name": "Tow Mirrors", "price": "$359"}, {"name": "Bed Cargo Divider", "price": "$199"}], "component_sum": "$1,066", "bundle_price": "$979"}]}, "pricing_note": {"headline": "Pricing is not the problem. One product is.", "narrative": "On confirmed comparable items Meridian sits in a ±10% band around peers - modestly above discount players, below peers where we compete on spec. No broad pricing action. One flag: the Sport Cat-Back Exhaust at $1,249 is a rebranded aluminized single-tip unit at near-parity with competitors' stainless systems ($1,149-$1,195). A similar price is hiding an inferior product - upgrade or reposition it; don't discount it."}, "recommendation": {"now": [{"action": "Launch the three packs", "detail": "On the storefront at bundle pricing, mapped to demonstrated affinities."}, {"action": "Re-merchandise the store", "detail": "Shop-by-build journeys, accessorized Talon imagery on model pages, top sellers surfaced, a guided build flow instead of the alphabetical list."}, {"action": "Put accessories into the configurator", "detail": "Led by the packs, at point of vehicle order - the one Now item with an IT dependency; start it first."}, {"action": "Run the recapture play", "detail": "Pack pricing plus a fitment guarantee positions the own channel against the internet sellers taking 44% of purchases."}], "next": [{"action": "Build the exterior-personalization range", "detail": "Second running-board finish, an 18-20\" wheel range, blackout trim, graphics - closing the offer-side gap behind the 17-point mix gap."}, {"action": "Fix or reposition the exhaust", "detail": "Stainless, dual-tip - or exit the price point."}, {"action": "Pilot bespoke/made-to-order", "detail": "Interior trim first, following the proven Northstar program."}, {"action": "Test the pet niche only if affinity confirms", "detail": "Explicitly a halo play; never sized as volume."}]}, "next_step": {"headline": "One low-cost proof, 90 days", "narrative": "Launch the Basecamp Pack and one accessorized-Talon build page, instrumented: attach of included SKUs, bundle take rate, own-channel share vs baseline. In parallel, pull per-SKU sales by channel - the one dataset this analysis lacked."}, "appendix": <script>
const {analysis:A, report:R} = JSON.parse(document.getElementById('payload').textContent);
const P = A.premise||{}, PD = P.deck||{}, PC = P.captions||{};
const S=['#2a78d6','#1baf7a','#eda100','#008300'];
const esc=s=>String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const p=(R.diagnosis.pattern||[]);
const c=R.composition, isMix=c.source==='purchase_mix', brandName=A.meta.brand;
const val=(e,b)=>{ if(isMix){const row=A.diagnostic.purchase_mix.buckets[b]||{};
    return row[e===brandName?'brand':e]??null;}
  const comp=e===brandName?A.catalog_composition.brand:A.catalog_composition.competitors[e];
  return comp?.buckets?.[b]?.share??0;};
const ents=c.entities.slice(0,2);
const bucketKeys=Object.keys(A.buckets).filter(b=>ents.some(e=>(val(e,b)||0)>0))
  .sort((a,b)=>(val(brandName,b)||0)-(val(brandName,a)||0)).slice(0,5);
const maxV=Math.max(...bucketKeys.flatMap(b=>ents.map(e=>val(e,b)||0)));
document.getElementById('page').innerHTML=`
  <div class="eyebrow">${esc(P.eyebrow||'Whitespace analysis')} - executive summary</div>
  <h1>${esc(R.title)}</h1>
  <div class="sub">${esc(R.subtitle||'')}${R.badge?`<span class="badge">${esc(R.badge)}</span>`:''}</div>
  <div class="verdict">${esc(R.diagnosis.verdict)}</div>
  <div class="why">${esc(R.why_it_matters)}</div>
  ${p.length?`<h2>The pattern</h2><div class="tiles">${p.map(t=>`
    <div class="tile"><div class="q">${esc(t.question)}</div><div class="v">${esc(t.brand_display)}</div>
    <div class="bench">vs ${esc(t.benchmark_display)}</div>
    <div class="read ${esc(t.tone||'warn')}">${esc(t.read)}</div></div>`).join('')}</div>`:''}
  <h2>The composition gap</h2>
  <div class="legend">${ents.map((e,i)=>`<span><span class="sw" style="background:${S[i]}"></span>${esc(e)}</span>`).join('')}</div>
  ${bucketKeys.map(b=>`<div class="brow"><div class="blabel">${esc(A.buckets[b])}</div><div class="bars">
    ${ents.map((e,i)=>{const v=val(e,b);return v==null?'':`<div class="bar" style="width:${(v/maxV*88).toFixed(1)}%;background:${S[i]}"><span class="val">${(v*100).toFixed(0)}%</span></div>`}).join('')}
  </div></div>`).join('')}
  <div class="caption">${isMix?(PC.mix||'Purchase mix: share of purchases; sums to 100% per brand.'):(PC.offer_share||'Catalog share: share of SKUs offered (offer-side, not behavioral).')}</div>
  <h2>${esc(PD.now_label||'Do now - from today’s catalog')}</h2>
  ${(R.recommendation.now||[]).map((r,i)=>`<div class="rec"><div class="n">${i+1}</div>
    <div><b>${esc(r.action)}</b><p>${esc(r.detail||'')}</p></div></div>`).join('')}
  <h2>Next step</h2>
  <div class="next">${esc(R.next_step.narrative)}</div>
  <div class="foot"><span>${esc(A.meta.brand)} · ${esc(A.meta.mode)} · ${esc(A.meta.generated)}</span>
    <span>${(R.appendix?.data_flags||[]).length} data flag(s) - see full report appendix</span></div>`;
document.title=R.title+' - one-pager';
</script>
