# SYNTHETIC demonstration data, styled after a syndicated new-vehicle
# accessory buyer survey. Not real market data. Remove this file to run the
# example in public-data mode.

source: SYNTHETIC demonstration data (styled after a syndicated accessory buyer survey)

brand:
  # attach_rate: share of buyers purchasing any accessory (the only "% of customers")
  attach_rate: 0.64
  # median accessory spend per purchasing buyer, first 12 months of ownership
  median_spend: 310
  # channel_capture: share of accessory purchases by channel, sums to 1
  channel_capture:
    own_channel: 0.34
    internet: 0.44
    aftermarket_store: 0.17
    other: 0.05
  # purchase_mix: share of accessory purchases by bucket, sums to 1 (mix %, NOT penetration)
  purchase_mix:
    commodity_protection: 0.48
    exterior_personalization: 0.14
    utility_cargo_towing: 0.24
    performance: 0.05
    lifestyle_whitespace: 0.02
    other: 0.07
  # affinity_index: buyer-base interest indices, 100 = general-population par
  affinity_index:
    camping_outdoors: 124
    fishing_hunting: 118
    home_improvement_diy: 111
    pets: 97
    boating: 88
    golf: 72

